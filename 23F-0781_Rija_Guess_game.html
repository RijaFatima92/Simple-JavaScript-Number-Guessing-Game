<!DOCTYPE html>
<html>
    <head>
       <title>Guess Number</title>
      <link rel="stylesheet" href="stylee.css">

    </head>
    <body>
  <div class="card">
         <h2>Guess a number (1-10)</h2>
         <div>
           <input id="guess" type="number" min="1" max="10" placeholder="1-10" />
           <button id="checkBtn">Guess</button>
         </div>
         <div class="message" id="message"></div>
         <div class="meta" id="attempts"></div>
         <div class="btn">
           <button id="resetBtn">Play Again</button>
         </div>
       </div>
       <script src="scriptt.js"></script>
    </body>
</html>
